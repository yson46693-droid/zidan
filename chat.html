<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <meta name="description" content="نظام الشات - Z-chat">
    <meta name="theme-color" content="#2196F3">
    <meta name="mobile-web-app-capable" content="yes">
    
    <!-- iOS Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Z-chat">
    <base href="./">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/chat.css">
    <link rel="stylesheet" href="css/dark-mode.css">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="css/vendor/bootstrap-icons/bootstrap-icons.css">
    
    <!-- ✅ Resource Checker - التحقق من تحميل الموارد الحرجة -->
    <script src="js/resource-checker.js"></script>
</head>
<body>
    <!-- صفحة الشات الرئيسية -->
    <div class="chat-container" id="chatContainer">
        <!-- الشريط العلوي -->
        <header class="chat-header">
            <button class="menu-btn" id="menuBtn" aria-label="القائمة" style="display: none;">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
                <span class="notification-badge" id="menuNotificationBadge" style="display: none;">0</span>
            </button>

            <!-- أزرار الموبايل (تظهر فقط على الموبايل) -->
            <div class="mobile-header-buttons" id="mobileHeaderButtons">
                <!-- زر الرجوع -->
                <button class="back-btn mobile-only" id="backBtn" aria-label="رجوع" title="رجوع">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                </button>

                <!-- زر تحديث الرسائل -->
                <button class="refresh-messages-btn mobile-only" id="refreshMessagesBtn" aria-label="تحديث الرسائل" title="تحديث الرسائل">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="23 4 23 10 17 10"></polyline>
                        <polyline points="1 20 1 14 7 14"></polyline>
                        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                    </svg>
                </button>

                <!-- زر حذف الشات (للمالك فقط) -->
                <button class="delete-chat-btn mobile-only" id="deleteChatBtn" aria-label="حذف الشات" title="حذف الشات" style="display: none;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="3 6 5 6 21 6"></polyline>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                        <line x1="10" y1="11" x2="10" y2="17"></line>
                        <line x1="14" y1="11" x2="14" y2="17"></line>
                    </svg>
                </button>
            </div>

        </header>

        <!-- منطقة الرسائل -->
        <div class="chat-messages" id="chatMessages">
            <!-- علامة التحميل داخل الشات -->
            <div class="chat-loading-indicator" id="chatLoadingIndicator" style="display: none;">
                <div class="chat-loading-spinner"></div>
                <p class="chat-loading-text">جاري تحميل الرسائل...</p>
            </div>
            <!-- الرسائل سيتم إضافتها ديناميكياً -->
        </div>

        <!-- شريط الإدخال -->
        <div class="chat-input-container">
            <div class="chat-input-wrapper">
            <button class="input-icon-btn emoji-btn" id="emojiBtn" aria-label="الإيموجي">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"></circle>
                    <path d="M8 14s1.5 2 4 2 4-2 4-2"></path>
                    <line x1="9" y1="9" x2="9.01" y2="9"></line>
                    <line x1="15" y1="9" x2="15.01" y2="9"></line>
                </svg>
            </button>
            
            <input 
                type="text" 
                class="chat-input" 
                id="chatInput" 
                placeholder="اكتب رسالة..."
                autocomplete="off"
                maxlength="1000"
            >
            
            <button class="input-icon-btn attach-btn" id="attachBtn" aria-label="مرفق">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
                </svg>
            </button>
            
            <button class="input-icon-btn audio-btn" id="audioBtn" aria-label="تسجيل صوتي">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                    <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                    <line x1="12" y1="19" x2="12" y2="23"></line>
                    <line x1="8" y1="23" x2="16" y2="23"></line>
                </svg>
            </button>
            
            <button class="send-btn" id="sendBtn" aria-label="إرسال">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    </div>

    <!-- قائمة المشاركين (Sidebar) -->
    <div class="participants-sidebar" id="participantsSidebar">
        <header class="sidebar-header">
            <h2 class="sidebar-title">Z-chat</h2>
            <button class="close-btn" id="closeSidebarBtn" aria-label="إغلاق">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
        </header>
        
        <div class="participants-section">
            <h3 class="participants-title">المشاركون</h3>
            <div class="participants-list" id="participantsList">
                <!-- المشاركون سيتم إضافتهم ديناميكياً -->
            </div>
        </div>
        
        <div class="current-user-section" id="currentUserSection">
            <!-- معلومات المستخدم الحالي -->
        </div>
    </div>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay" style="display: none;">
        <div class="loading-spinner"></div>
    </div>

    <!-- Scripts -->
    <script src="js/api.js" defer></script>
    <script src="js/utils.js" defer></script>
    <script src="js/auth.js" defer></script>
    <script src="js/permissions.js" defer></script>
    <script src="js/global-notifications.js" defer></script>
    <!-- RecordRTC library for audio recording (supports iOS, Android, Desktop) -->
    <script src="https://cdn.jsdelivr.net/npm/recordrtc@5.6.2/RecordRTC.min.js"></script>
    
    <!-- إخفاء loading overlay إذا كانت الصفحة داخل iframe (على الكمبيوتر) -->
    <script>
        (function() {
            // التحقق من أن الصفحة تعمل داخل iframe
            const isInIframe = window.self !== window.top;
            
            if (isInIframe) {
                // إخفاء loading overlay فوراً
                const loadingOverlay = document.getElementById('loadingOverlay');
                if (loadingOverlay) {
                    loadingOverlay.style.display = 'none';
                    console.log('📦 الشات يعمل داخل iframe - تم إخفاء loading overlay');
                }
            }
        })();
    </script>
    
    <!-- حماية الصفحة - فحص تسجيل الدخول فوراً -->
    <script>
        (async function protectPage() {
            try {
                // ✅ منع الاستدعاء المتعدد
                if (window.protectPageInProgress) {
                    console.log('⏸️ فحص تسجيل الدخول قيد التنفيذ بالفعل');
                    return;
                }
                window.protectPageInProgress = true;
                
                // الانتظار حتى يتم تحميل API و auth
                let retries = 0;
                const maxRetries = 30; // تقليل عدد المحاولات
                while ((typeof API === 'undefined' || typeof checkLogin !== 'function') && retries < maxRetries) {
                    await new Promise(resolve => setTimeout(resolve, 100));
                    retries++;
                }
                
                if (typeof API === 'undefined' || typeof checkLogin !== 'function') {
                    console.error('❌ فشل تحميل ملفات المصادقة بعد', maxRetries, 'محاولة');
                    window.protectPageInProgress = false;
                    // ✅ استخدام replace بدلاً من href لتجنب إضافة للتاريخ
                    window.location.replace('index.html');
                    return;
                }
                
                // فحص تسجيل الدخول
                const user = await checkLogin();
                
                if (!user) {
                    console.log('❌ المستخدم غير مسجل دخول - إعادة التوجيه...');
                    window.protectPageInProgress = false;
                    window.location.replace('index.html');
                    return;
                }
                
                console.log('✅ تم التحقق من تسجيل الدخول بنجاح');
                window.protectPageInProgress = false;
                
                // ✅ إصلاح CSS و Bootstrap Icons عند تحميل الصفحة
                if (typeof ensureCSSAndIconsLoaded === 'function') {
                    ensureCSSAndIconsLoaded();
                }
            } catch (error) {
                console.error('❌ خطأ في فحص تسجيل الدخول:', error);
                window.protectPageInProgress = false;
                
                // محاولة مرة أخرى قبل التوجيه (فقط مرة واحدة)
                try {
                    await new Promise(resolve => setTimeout(resolve, 1000));
                    if (typeof checkLogin === 'function') {
                        const user = await checkLogin();
                        if (user) {
                            console.log('✅ نجحت المحاولة الثانية للتحقق من تسجيل الدخول');
                            return;
                        }
                    }
                } catch (retryError) {
                    console.error('❌ فشلت المحاولة الثانية:', retryError);
                }
                window.location.replace('index.html');
            }
        })();
    </script>
    
    <script src="js/chat.js" defer></script>
</body>
</html>
