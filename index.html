    <script>
        // ✅ مسح sessionStorage عند تحميل الصفحة لضمان عمل splash screen بشكل صحيح
        // (سيتم إعادة تعيينه عند إخفاء splash screen بنجاح)

        //     setTimeout(() => {
        //         const splashScreen = document.getElementById('splash-screen');
        //         const loginContainer = document.querySelector('.login-container');
        //         if (splashScreen && !splashScreen.classList.contains('hidden')) {
        //             console.warn('⚠️ Force hiding splash screen after 5 seconds (fallback)');
        //             splashScreen.classList.add('hidden');
        //             splashScreen.style.opacity = '0';
        //             splashScreen.style.visibility = 'hidden';
        //             splashScreen.style.pointerEvents = 'none';
        //             if (loginContainer) {
        //                 loginContainer.style.opacity = '1';
        //                 loginContainer.style.visibility = 'visible';
        //                 loginContainer.style.display = 'flex';
        //             }
        //         }
        //     }, 5000);
        // })();
        
        // تحديد المسار الأساسي قبل تحميل أي ملفات أخرى
        (function() {
            try {
                const pathname = window.location.pathname;
                let basePath = '';
                
                // ✅ إصلاح: التحقق من أن pathname ليس مجرد ملف في root
                // إذا كان pathname هو /index.html أو /، نكون في root (basePath = '')
                // إذا كان pathname مثل /z/index.html، basePath = '/z'
                if (pathname !== '/' && pathname !== '/index.html' && !pathname.endsWith('/index.html')) {
                    // استخراج المجلد الفرعي إذا كان موجوداً (مثل /z/index.html -> /z)
                    const match = pathname.match(/^(\/[^\/]+)/);
                    if (match && match[1] !== '/' && !match[1].startsWith('/index')) {
                        basePath = match[1]; // مثل '/z'
                    }
                }
                
                // حفظ المسار الأساسي في window للاستخدام لاحقاً
                window.BASE_PATH = basePath;
                
                // دالة مساعدة لإصلاح المسارات
                function fixPath(path) {
                    if (!path) return path;
                    // إذا كان المسار يبدأ بـ /، أضف basePath
                    if (path.startsWith('/')) {
                        return basePath + path;
                    }
                    // إذا كان المسار نسبي، اتركه كما هو (سيعمل تلقائياً)
                    return path;
                }
                
                // إصلاح جميع المسارات في الصفحة
                document.addEventListener('DOMContentLoaded', function() {
                    // إصلاح preload links
                    document.querySelectorAll('link[rel="preload"]').forEach(link => {
                        const href = link.getAttribute('href');
                        if (href && !href.startsWith('http') && !href.startsWith('//')) {
                            link.setAttribute('href', fixPath(href));
                        }
                    });
                    
                    // إصلاح script tags
                    document.querySelectorAll('script[src]').forEach(script => {
                        const src = script.getAttribute('src');
                        if (src && !src.startsWith('http') && !src.startsWith('//') && !src.startsWith('data:')) {
                            script.setAttribute('src', fixPath(src));
                        }
                    });
                    
                    // إصلاح link tags (CSS)
                    document.querySelectorAll('link[rel="stylesheet"]').forEach(link => {
                        const href = link.getAttribute('href');
                        if (href && !href.startsWith('http') && !href.startsWith('//')) {
                            link.setAttribute('href', fixPath(href));
                        }
                    });
                });
            } catch (e) {
                console.error('خطأ في تحديد المسار الأساسي:', e);
            }
        })();
    </script>

        .splash-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,var(--primary-color),var(--secondary-color));display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:999999;opacity:1;visibility:visible}

    <!-- تحميل الوضع الليلي فوراً - قبل تحميل body -->
    <script>
        (function loadDarkModeEarly() {
            try {
                const darkMode = localStorage.getItem('darkMode');
                if (darkMode === 'enabled') {
                    document.documentElement.classList.add('dark-mode');
                    // body لم يتم تحميله بعد، سنضيف class لاحقاً
                    if (document.body) {
                        document.body.classList.add('dark-mode');
                    } else {
                        document.addEventListener('DOMContentLoaded', function() {
                            document.body.classList.add('dark-mode');
                        });
                    }
                }
            } catch (error) {
                console.error('خطأ في تحميل الوضع الليلي:', error);
            }
        })();
    </script>

    <!-- تحميل ملفات JS بشكل غير متزامن (defer) لتحسين الأداء -->
    <!-- سيتم إصلاح المسارات تلقائياً بواسطة script في head -->
    <script>
        // إصلاح المسارات قبل تحميل الملفات مع معالجة الأخطاء
        (function() {
            const basePath = window.BASE_PATH || '';
            const scripts = [
                'js/api.js',
                'js/utils.js',
                'js/splash-screen.js',
                'js/loading-overlay.js',
                'js/auth.js',
                'js/permissions.js'
            ];
            
            scripts.forEach(src => {
                const script = document.createElement('script');
                const fullPath = basePath ? basePath + '/' + src : src;
                script.src = fullPath;
                script.defer = true;
                
                // ✅ إضافة معالجة الأخطاء للكشف عن HTML بدلاً من JavaScript
                script.onerror = function() {
                    console.error(`❌ فشل تحميل ${fullPath} - قد يكون الملف غير موجود أو المسار خاطئ`);
                    // محاولة تحميل بدون basePath إذا كان موجوداً
                    if (basePath && !fullPath.startsWith('http')) {
                        console.log(`🔄 محاولة تحميل ${src} بدون basePath...`);
                        const fallbackScript = document.createElement('script');
                        fallbackScript.src = src;
                        fallbackScript.defer = true;
                        fallbackScript.onerror = () => {
                            console.error(`❌ فشل تحميل ${src} حتى بدون basePath`);
                            // ✅ إذا فشل تحميل splash-screen.js، إخفاء splash screen يدوياً
                            if (src === 'js/splash-screen.js') {
                                setTimeout(() => {
                                    const splashScreen = document.getElementById('splash-screen');
                                    const loginContainer = document.querySelector('.login-container');
                                    if (splashScreen) {
                                        splashScreen.classList.add('hidden');
                                        splashScreen.style.opacity = '0';
                                        splashScreen.style.visibility = 'hidden';
                                        splashScreen.style.pointerEvents = 'none';
                                    }
                                    if (loginContainer) {
                                        loginContainer.classList.add('show');
                                        loginContainer.style.opacity = '1';
                                        loginContainer.style.visibility = 'visible';
                                        loginContainer.style.display = 'flex';
                                    }
                                }, 2000); // إخفاء بعد ثانيتين كحل احتياطي
                            }
                        };
                        document.body.appendChild(fallbackScript);
                    } else if (src === 'js/splash-screen.js') {
                        // ✅ إذا فشل تحميل splash-screen.js بدون basePath أيضاً، إخفاء يدوي
                        setTimeout(() => {
                            const splashScreen = document.getElementById('splash-screen');
                            const loginContainer = document.querySelector('.login-container');
                            if (splashScreen) {
                                splashScreen.classList.add('hidden');
                                splashScreen.style.opacity = '0';
                                splashScreen.style.visibility = 'hidden';
                                splashScreen.style.pointerEvents = 'none';
                            }
                            if (loginContainer) {
                                loginContainer.classList.add('show');
                                loginContainer.style.opacity = '1';
                                loginContainer.style.visibility = 'visible';
                                loginContainer.style.display = 'flex';
                            }
                        }, 2000); // إخفاء بعد ثانيتين كحل احتياطي
                    }
                };
                
                // ✅ التحقق من أن الملف المحمّل هو JavaScript وليس HTML
                script.onload = function() {
                    // التحقق من أن الملف محمّل بشكل صحيح
                    try {
                        // محاولة الوصول إلى دالة معروفة من الملف
                        if (src === 'js/api.js' && typeof window.API === 'undefined') {
                            console.warn(`⚠️ ${src} تم تحميله لكن window.API غير موجود`);
                        }
                        if (src === 'js/utils.js' && typeof window.showMessage === 'undefined') {
                            console.warn(`⚠️ ${src} تم تحميله لكن window.showMessage غير موجود`);
                        }
                    } catch (e) {
                        console.error(`❌ خطأ في التحقق من ${src}:`, e);
                    }
                };
                
                document.body.appendChild(script);
            });
        })();
    </script>
    <script>
        // التحقق من تحميل جميع العناصر بشكل صحيح
        window.addEventListener('DOMContentLoaded', () => {
            // ✅ تحميل الوضع الليلي من localStorage
            try {

                    // تجاهل الأخطاء في التحقق من الجلسة
                    console.log('⏸️ خطأ في التحقق من الجلسة - تم تجاهله:', error.message || error);
                    sessionStorage.removeItem('just_logged_in_time');
                    
                    // ✅ التأكد من إخفاء splash screen حتى لو فشل checkAuth
                    if (window.splashScreenManager && !window.splashScreenManager.hideProcessCompleted) {
                        setTimeout(() => {
                            if (window.splashScreenManager) {
                                window.splashScreenManager.hide();
                            }
                        }, 500);
                    }
                }
            }, 1500); // زيادة التأخير إلى 1.5 ثانية لتجنب التداخل مع تسجيل الدخول
        }
        
        // استدعاء initPage مرة واحدة فقط
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initPage);
        } else {
            initPage();
        }
        
        // تسجيل Service Worker - فوري وموثوق لضمان عمل PWA
        const registerServiceWorker = async () => {
            if ('serviceWorker' in navigator) {
                try {
                    // ✅ تعيين علامة أن Service Worker قيد التسجيل
                    window.serviceWorkerRegistering = true;
                    
                    // تحديد المسار الأساسي تلقائياً
                    const getBasePath = () => {
                        try {
                            // ✅ استخدام BASE_PATH المحفوظ مسبقاً بدلاً من إعادة الحساب
                            return window.BASE_PATH || '';
                        } catch (e) {
                            return '';
                        }
                    };
                    const basePath = getBasePath();
                    // ✅ إصلاح: استخدام مسار مطلق للـ service worker
                    // ✅ استخدام sw.js.php كحل بديل لضمان MIME type الصحيح
                    const swUrl = basePath ? `${basePath}/sw.js.php` : '/sw.js.php';
                    const swUrlFallback = basePath ? `${basePath}/sw.js` : '/sw.js';
                    // ✅ إصلاح: scope يجب أن يكون root دائماً (/) أو basePath/
                    // لا نستخدم pathname الحالي لأن scope يجب أن يكون من root
                    const scope = basePath ? `${basePath}/` : '/';
                    
                    let registration;
                    try {
                        // محاولة استخدام sw.js.php أولاً
                        registration = await navigator.serviceWorker.register(swUrl, {
                            scope: scope,
                            updateViaCache: 'none'
                        });
                    } catch (error) {
                        // ✅ Fallback: إذا فشل sw.js.php، استخدم sw.js مباشرة
                        if (error.message && error.message.includes('500')) {
                            console.warn('⚠️ sw.js.php failed (500), trying sw.js directly...');
                            try {
                                registration = await navigator.serviceWorker.register(swUrlFallback, {
                                    scope: scope,
                                    updateViaCache: 'none'
                                });
                                console.log('✅ Service Worker registered using sw.js fallback');
                            } catch (fallbackError) {
                                console.error('❌ Both sw.js.php and sw.js failed:', fallbackError);
                                throw fallbackError;
                            }
                        } else {
                            throw error;
                        }
                    }
                    
                    // ✅ إزالة العلامة بعد التسجيل
                    window.serviceWorkerRegistering = false;
                    window.serviceWorkerRegistered = true;
                    
                    console.log('✅ Service Worker registered successfully');
                    console.log('   - Scope:', registration.scope);
                    console.log('   - Active:', registration.active ? 'Yes' : 'Waiting');
                    
                    // انتظار تفعيل Service Worker
                    if (registration.installing) {
                        registration.installing.addEventListener('statechange', function() {
                            if (this.state === 'activated') {
                                console.log('✅ Service Worker activated and ready');
                            }
                        });
                    } else if (registration.waiting) {
                        console.log('✅ Service Worker waiting to activate');
                    } else if (registration.active) {
                        console.log('✅ Service Worker already active');
                    }
                    
                    // ✅ الحل 4: إلغاء Polling في صفحة تسجيل الدخول
                    const checkForUpdates = async () => {
                        // ✅ إلغاء التحقق إذا كنا في صفحة تسجيل الدخول
                        const currentPath = window.location.pathname;
                        if (currentPath.includes('index.html') || currentPath === '/') {
                            console.log('⏸️ في صفحة تسجيل الدخول - تم إلغاء التحقق من التحديثات');
                            return;
                        }
                        
                        try {
                            console.log('🔄 التحقق من التحديثات...');
                            await registration.update();
                            
                            // التحقق من وجود Service Worker محدث
                            if (registration.waiting) {
                                console.log('🔄 تم اكتشاف Service Worker محدث - سيتم التفعيل');
                                registration.waiting.postMessage({ type: 'SKIP_WAITING' });
                            }
                        } catch (error) {
                            console.warn('⚠️ خطأ في التحقق من التحديثات:', error);
                        }
                    };
                    
                    // ✅ الحل 4: التحقق من التحديثات فقط في الصفحات الأخرى (ليس في صفحة تسجيل الدخول)
                    const currentPath = window.location.pathname;
                    if (!currentPath.includes('index.html') && currentPath !== '/') {
                        // ✅ تحسين: استخدام requestIdleCallback للتحقق من التحديثات
                        if (window.requestIdleCallback) {
                            requestIdleCallback(checkForUpdates, { timeout: 2000 });
                        } else {
                            setTimeout(checkForUpdates, 1000);
                        }
                        
                        // ✅ تقليل الاستدعاءات: التحقق بشكل دوري كل 5 دقائق (بدلاً من 30 ثانية)
                        setInterval(checkForUpdates, 300000); // كل 5 دقائق (300000 مللي ثانية)
                    }
                    
                    return registration;
                } catch (error) {
                    // ✅ إزالة العلامة في حالة الخطأ
                    window.serviceWorkerRegistering = false;
                    console.error('❌ Service Worker registration failed:', error.message || error);
                    return null;
                }
            } else {
                console.warn('⚠️ Service Worker not supported');
                return null;
            }
        };
        
        // ✅ الحل 3: تأخير تسجيل Service Worker حتى بعد تحميل الصفحة
        const registerServiceWorkerDelayed = async () => {
            // ✅ تأخير 2 ثانية بعد تحميل الصفحة
            await new Promise(resolve => setTimeout(resolve, 2000));
            await registerServiceWorker();
        };
        
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => {
                setTimeout(registerServiceWorkerDelayed, 100);
            });
        } else {
            // ✅ استخدام requestIdleCallback إذا كان متاحاً
            if (window.requestIdleCallback) {
                requestIdleCallback(registerServiceWorkerDelayed, { timeout: 500 });
            } else {
                setTimeout(registerServiceWorkerDelayed, 100);
            }
        }
        
        // تحميل PWA Validator و Install Manager
        let pwaToolsLoaded = false; // ✅ منع التحميل المكرر
        const loadPWATools = () => {
            // ✅ التحقق من عدم تحميل السكريبتات مرتين
            if (pwaToolsLoaded) {
                return;
            }
            
            // ✅ التحقق من وجود السكريبتات بالفعل في DOM
            const existingValidator = document.querySelector('script[src="js/pwa-validator.js"]');
            const existingInstall = document.querySelector('script[src="js/pwa-install.js"]');
            
            if (existingValidator || existingInstall) {
                pwaToolsLoaded = true;
                return;
            }
            
            pwaToolsLoaded = true;
            
            // تحميل Validator
            const validatorScript = document.createElement('script');
            validatorScript.src = 'js/pwa-validator.js';
            validatorScript.async = true;
            validatorScript.onload = () => {
                console.log('✅ PWA Validator loaded');
                // ✅ تحسين: استخدام requestIdleCallback للتحقق
                const validatePWA = async () => {
                    if (window.PWAValidator) {
                        const validator = new window.PWAValidator();
                        await validator.validate();
                    }
                };
                
                if (window.requestIdleCallback) {
                    requestIdleCallback(validatePWA, { timeout: 3000 });
                } else {
                    setTimeout(validatePWA, 2000);
                }
            };
            validatorScript.onerror = () => {
                console.warn('⚠️ Failed to load PWA Validator');
                pwaToolsLoaded = false; // السماح بالمحاولة مرة أخرى في حالة الفشل
            };
            document.body.appendChild(validatorScript);
            
            // تحميل PWA Install Manager
            const script = document.createElement('script');
            script.src = 'js/pwa-install.js';
            script.async = true;
            script.onload = () => {
                console.log('✅ PWA Install Manager loaded');
            };
            script.onerror = () => {
                console.warn('⚠️ Failed to load PWA Install Manager');
                pwaToolsLoaded = false; // السماح بالمحاولة مرة أخرى في حالة الفشل
            };
            document.body.appendChild(script);
        };
        
        // ✅ تحسين: تحميل PWA Tools بعد التفاعل الأول (lazy load)
        const loadPWAToolsOnInteraction = () => {
            loadPWATools();
        };
        
        // تحميل بعد التفاعل الأول أو بعد 3 ثوان
        ['click', 'touchstart', 'keydown'].forEach(event => {
            document.addEventListener(event, loadPWAToolsOnInteraction, { once: true, passive: true });
        });
        
        window.addEventListener('load', () => {
            if (window.requestIdleCallback) {
                requestIdleCallback(loadPWAToolsOnInteraction, { timeout: 3000 });
            } else {
                setTimeout(loadPWAToolsOnInteraction, 3000);
            }
        });
    </script>

    <!-- تحديث رقم الإصدار من version.json - يضمن التحديث حتى بعد مسح الكاش -->
    <script>
        (function() {
            // ✅ Flag لمنع التحديث المتكرر
            let versionUpdateInProgress = false;
            let lastFetchedVersion = null;
            
            // دالة لتحديث رقم الإصدار في الواجهة مباشرة من version.json
            async function updateVersionDisplay() {
                // منع التحديث المتكرر
                if (versionUpdateInProgress) {
                    return;
                }
                
                try {
                    const versionElement = document.getElementById('appVersionDisplay');
                    if (!versionElement) {
                        return; // العنصر غير موجود
                    }
                    
                    versionUpdateInProgress = true;
                    
                    // محاولة استخدام window.getAppVersionClean من version.js إذا كان متاحاً
                    if (typeof window !== 'undefined' && window.getAppVersionClean) {
                        const cleanVersion = window.getAppVersionClean();
                        if (cleanVersion && cleanVersion !== lastFetchedVersion) {
                            versionElement.textContent = 'v' + cleanVersion;
                            lastFetchedVersion = cleanVersion;
                            console.log('✅ [Version] تم تحديث الإصدار من version.js:', cleanVersion);
                            versionUpdateInProgress = false;
                            
                            // التحقق مرة أخرى بعد تأخير للتأكد من التحديث
                            setTimeout(() => {
                                if (versionElement.textContent !== 'v' + cleanVersion) {
                                    fetchVersionDirectly();
                                }
                            }, 500);
                            return;
                        }
                    }
                    
                    // إذا لم يكن version.js محمّل بعد، قراءة مباشرة من version.json
                    await fetchVersionDirectly();
                } catch (error) {
                    console.warn('[Version] خطأ في تحديث رقم الإصدار:', error);
                } finally {
                    versionUpdateInProgress = false;
                }
            }
            
            // دالة لجلب الإصدار مباشرة من version.json بدون cache
            async function fetchVersionDirectly() {
                try {
                    const versionElement = document.getElementById('appVersionDisplay');
                    if (!versionElement) return;
                    
                    // ✅ مسح جميع الكاش المخزن للإصدار قبل جلب البيانات
                    const cacheKeys = [
                        'version_json_cache',
                        'version_json_cache_time',
                        'version_check_cache',
                        'version_check_cache_time',
                        'version_check_timestamp'
                    ];
                    
                    cacheKeys.forEach(key => {
                        try {
                            localStorage.removeItem(key);
                            sessionStorage.removeItem(key);
                        } catch (e) {
                            // تجاهل الأخطاء
                        }
                    });
                    
                    // ✅ استخدام cache busting parameters لضمان عدم استخدام cache
                    const cacheBuster = Date.now() + '&nocache=' + Math.random() + '&v=' + Date.now();
                    const response = await fetch('version.json?' + cacheBuster, {
                        cache: 'no-store',
                        headers: {
                            'Cache-Control': 'no-cache, no-store, must-revalidate, max-age=0',
                            'Pragma': 'no-cache',
                            'Expires': '0'
                        }
                    });
                    
                    if (response.ok) {
                        const data = await response.json();
                        if (data.version) {
                            // تحديث حتى لو كان نفس الإصدار (للتأكد من التحديث)
                            const versionText = 'v' + data.version;
                            versionElement.textContent = versionText;
                            lastFetchedVersion = data.version;
                            console.log('✅ [Version] تم تحديث الإصدار مباشرة من version.json:', data.version);
                            
                            // تحديث window.APP_VERSION_CLEAN إذا كان متاحاً
                            if (typeof window !== 'undefined') {
                                window.APP_VERSION_CLEAN = data.version;
                            }
                        } else {
                            console.warn('[Version] لا يوجد حقل version في version.json');
                        }
                    } else {
                        console.warn('[Version] فشل جلب version.json - Status:', response.status);
                    }
                } catch (error) {
                    console.warn('[Version] تعذر جلب الإصدار من version.json:', error);
                    // في حالة الخطأ، إبقاء placeholder أو عرض رسالة خطأ
                    const versionElement = document.getElementById('appVersionDisplay');
                    if (versionElement && versionElement.textContent === 'جاري التحميل...') {
                        versionElement.textContent = 'v?';
                    }
                }
            }
            
            // ✅ دالة للتأكد من التحديث بعد تحميل version.js
            function ensureVersionUpdated() {
                const versionElement = document.getElementById('appVersionDisplay');
                if (!versionElement) return;
                
                // إذا كان الإصدار لا يزال placeholder أو لا يبدأ بـ 'v'، جلب من version.json
                const currentVersion = versionElement.textContent.trim();
                if (currentVersion === 'جاري التحميل...' || currentVersion === 'Loading...' || !currentVersion.startsWith('v')) {
                    fetchVersionDirectly();
                }
            }
            
            // ✅ تحديث الإصدار فوراً عند تحميل الصفحة (قبل DOMContentLoaded إذا أمكن)
            // محاولة التحديث الفوري
            updateVersionDisplay();
            
            // تحديث الإصدار عند تحميل الصفحة
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', function() {
                    updateVersionDisplay();
                    setTimeout(updateVersionDisplay, 300);
                    setTimeout(updateVersionDisplay, 1000);
                    setTimeout(ensureVersionUpdated, 2000);
                });
            } else {
                setTimeout(updateVersionDisplay, 100);
                setTimeout(updateVersionDisplay, 500);
                setTimeout(updateVersionDisplay, 1000);
                setTimeout(ensureVersionUpdated, 2000);
            }
            
            // ✅ تحديث الإصدار عند تحميل version.js (إذا كان متأخراً)
            if (typeof window !== 'undefined') {
                // استبدال window.updateVersionDisplay إذا كان موجوداً
                const checkVersionJs = setInterval(() => {
                    if (window.getAppVersionClean && window.updateVersionDisplay) {
                        clearInterval(checkVersionJs);
                        
                        const originalUpdateVersionDisplay = window.updateVersionDisplay;
                        window.updateVersionDisplay = function() {
                            if (originalUpdateVersionDisplay) {
                                originalUpdateVersionDisplay();
                            }
                            setTimeout(() => {
                                updateVersionDisplay();
                                ensureVersionUpdated();
                            }, 200);
                        };
                        
                        // استدعاء التحديث فوراً
                        updateVersionDisplay();
                    }
                }, 100);
                
                // إيقاف الفحص بعد 10 ثوان
                setTimeout(() => clearInterval(checkVersionJs), 10000);
            }
            
            // ✅ إضافة event listener عند تحميل جميع الملفات
            window.addEventListener('load', function() {
                setTimeout(ensureVersionUpdated, 500);
            });
        })();
    </script>
