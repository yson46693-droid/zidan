        .install-button:disabled {

        }
        
        .instructions {

    <!-- تحميل ملف الإصدارات أولاً -->
    <script src="js/version.js"></script>
    <script src="js/pwa-install.js"></script>
    <script>
        // دالة معالجة النقر على زر التثبيت
        async function handleInstallClick() {
            const installButton = document.getElementById('installButton');
            if (installButton) {
                installButton.disabled = true;
                installButton.innerHTML = '<i class="bi bi-hourglass-split"></i> <span>جاري التحضير...</span>';
            }
            
            try {
                // انتظار تحميل pwaInstallManager إذا لم يكن متاحاً
                if (!window.pwaInstallManager) {
                    await new Promise((resolve) => {
                        let attempts = 0;
                        const checkManager = () => {
                            if (window.pwaInstallManager || typeof pwaInstallManager !== 'undefined') {
                                resolve();
                            } else if (attempts < 50) {
                                attempts++;
                                setTimeout(checkManager, 100);
                            } else {
                                resolve();
                            }
                        };
                        checkManager();
                    });
                }
                
                if (window.pwaInstallManager) {
                    const browser = window.pwaInstallManager.getBrowser();
                    const isChromeDesktop = browser === 'chrome' && !window.pwaInstallManager.isAndroid() && !window.pwaInstallManager.isIOS();
                    
                    if (browser === 'firefox') {
                        await window.pwaInstallManager.installForFirefox();
                    } else if (isChromeDesktop && !window.pwaInstallManager.deferredPrompt) {
                        // Chrome Desktop بدون deferredPrompt - عرض تعليمات
                        showInstructions('desktop');
                        if (installButton) {
                            installButton.disabled = false;
                            installButton.innerHTML = '<i class="bi bi-download"></i> <span>تثبيت التطبيق</span>';
                        }
                    } else {
                        const result = await window.pwaInstallManager.install();
                        if (!result && installButton) {
                            installButton.disabled = false;
                            installButton.innerHTML = '<i class="bi bi-download"></i> <span>تثبيت التطبيق</span>';
                        }
                    }
                } else {
                    // إذا لم يكن manager متاحاً، نعرض التعليمات حسب الجهاز
                    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
                    const isAndroid = /Android/.test(navigator.userAgent);
                    
                    if (isIOS) {
                        showInstructions('ios');
                    } else if (isAndroid) {
                        showInstructions('android');
                    } else {
                        showInstructions('desktop');
                    }
                    
                    if (installButton) {
                        installButton.disabled = false;
                        installButton.innerHTML = '<i class="bi bi-download"></i> <span>تثبيت التطبيق</span>';
                    }
                }
            } catch (error) {
                console.error('Error in handleInstallClick:', error);
                if (installButton) {
                    installButton.disabled = false;
                    installButton.innerHTML = '<i class="bi bi-download"></i> <span>تثبيت التطبيق</span>';
                }
            }
        }
        
        // كشف المتصفح والجهاز تلقائياً وإظهار زر التثبيت
        const initInstallUI = async () => {
            // انتظار تحميل pwaInstallManager
            let attempts = 0;
            const maxAttempts = 50;
            
            const waitForManager = () => {
                return new Promise((resolve) => {
                    const checkManager = () => {
                        if (window.pwaInstallManager || typeof pwaInstallManager !== 'undefined') {
                            resolve(window.pwaInstallManager || pwaInstallManager);
                        } else if (attempts < maxAttempts) {
                            attempts++;
                            setTimeout(checkManager, 100);
                        } else {
                            resolve(null);
                        }
                    };
                    checkManager();
                });
            };
            
            const manager = await waitForManager();
            const installButton = document.getElementById('installButton');
            
            if (!installButton) {
                console.warn('⚠️ Install button not found');
                return;
            }
            
            if (manager) {
                const info = manager.getInstallInfo();
                const browser = manager.getBrowser();
                console.log('📱 Device Info:', info);
                console.log('🌐 Browser:', browser);
                
                // التحقق من وضع standalone (مثبت بالفعل)
                const isStandalone = window.matchMedia && window.matchMedia('(display-mode: standalone)').matches;
                if (isStandalone) {
                    console.log('✅ App already installed - hiding install button');
                    installButton.classList.add('hidden');
                    return;
                }
                
                // إظهار زر التثبيت في جميع الحالات ما عدا إذا كان مثبتاً بالفعل
                if (!info.isInstalled) {
                    // التحقق من متطلبات PWA
                    const canInstall = await manager.checkPWARequirements().catch(() => false);
                    
                    if (canInstall) {
                        console.log('✅ PWA requirements met - showing install button');
                        installButton.classList.remove('hidden');
                        installButton.style.display = 'inline-flex';
                    } else {
                        // إظهار الزر حتى لو لم تكن المتطلبات متوفرة (لإظهار التعليمات)
                        console.log('⚠️ PWA requirements not fully met, but showing button for instructions');
                        installButton.classList.remove('hidden');
                        installButton.style.display = 'inline-flex';
                    }
                    
                    // إظهار تعليمات تلقائية حسب الجهاز
                    if (info.isIOS) {
                        setTimeout(() => showInstructions('ios'), 1500);
                    } else if (info.isAndroid && !info.canAutoInstall) {
                        setTimeout(() => showInstructions('android'), 1500);
                    } else if (info.browser === 'firefox') {
                        // لا نعرض التعليمات تلقائياً في Firefox
                    } else if (browser === 'chrome' && !info.isAndroid && !info.isIOS) {
                        // Chrome Desktop - لا نعرض التعليمات تلقائياً
                        setTimeout(() => showInstructions('desktop'), 2000);
                    } else if (!info.isSupported) {
                        setTimeout(() => showInstructions('legacy'), 1500);
                    }
                }
            } else {
                // إذا لم يكن manager متاحاً، نعرض الزر لإظهار التعليمات
                console.warn('⚠️ PWA Install Manager not available, showing button anyway');
                installButton.classList.remove('hidden');
                installButton.style.display = 'inline-flex';
                
                // كشف بسيط للجهاز
                const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
                const isAndroid = /Android/.test(navigator.userAgent);
                const isMobile = isIOS || isAndroid;
                
                if (isIOS) {
                    setTimeout(() => showInstructions('ios'), 1500);
                } else if (isAndroid) {
                    setTimeout(() => showInstructions('android'), 1500);
                } else {
                    setTimeout(() => showInstructions('desktop'), 1500);
                }
            }
        };
        
        // تهيئة عند تحميل الصفحة
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => {
                setTimeout(initInstallUI, 500);
            });
        } else {
            setTimeout(initInstallUI, 500);
        }

            const title = document.getElementById('instructionsTitle');
            const content = document.getElementById('instructionsContent');
            
            const instructionsData = {

                        },
                        {
                            icon: 'bi-three-dots-vertical',

                            text: 'اضغط على القائمة (النقاط الثلاث) في الزاوية العلوية اليمنى'
                        },
                        {
                            icon: 'bi-download',
                            title: 'اختر "تثبيت التطبيق"',
                            text: 'ابحث عن "تثبيت التطبيق" أو "Install app" واضغط عليه'
                        },
                        {
                            icon: 'bi-check-circle',

                            text: 'اضغط "تثبيت" في النافذة المنبثقة'

                    ]

                        },

                        },
                        {

                        },
                        {
                            icon: 'bi-check-circle',

                        }

                        },

                        },

                        }
                    ]
                },
                legacy: {
                    title: 'تثبيت على المتصفحات القديمة',
                    steps: [
                        {
                            icon: 'bi-browser-chrome',
                            title: 'Internet Explorer',

                        },
                        {

                        {

            const data = instructionsData[device];
            title.textContent = data.title;
            content.innerHTML = data.steps.map((step, index) => `
                <div class="instruction-item">
                    <i class="bi ${step.icon}"></i>

            instructions.style.display = 'block';
            instructions.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

        // تسجيل Service Worker لدعم PWA
        const registerServiceWorker = async () => {
            if ('serviceWorker' in navigator) {
                try {
                    // ✅ تحديد المسار من مجلد الصفحة الحالية (يعمل من الجذر أو مجلد فرعي على Hostinger)
                    const getBasePath = () => {
                        try {
                            const pathname = window.location.pathname || '/';
                            const dir = pathname.replace(/\/[^/]*$/, '');
                            return dir || '';
                        } catch (e) {
                            return '';
                        }
                    };
                    const basePath = getBasePath();
                    // ✅ إصلاح: scope يجب أن ينتهي بـ / دائماً
                    const scope = basePath ? `${basePath}/` : '/';
                    
                    // ✅ محاولة استخدام sw.js.php أولاً، ثم sw.js كبديل
                    let swUrl = basePath ? `${basePath}/sw.js.php` : '/sw.js.php';
                    let registration;
                    
                    try {
                        registration = await navigator.serviceWorker.register(swUrl, {
                            scope: scope,
                            updateViaCache: 'none'
                        });
                        console.log('✅ Service Worker registered in Install (sw.js.php):', registration.scope);
                    } catch (phpError) {
                        // ✅ Fallback: استخدام sw.js مباشرة
                        console.warn('⚠️ sw.js.php failed, trying sw.js as fallback:', phpError.message);
                        swUrl = basePath ? `${basePath}/sw.js` : '/sw.js';
                        registration = await navigator.serviceWorker.register(swUrl, {
                            scope: scope,
                            updateViaCache: 'none'
                        });
                        console.log('✅ Service Worker registered in Install (sw.js fallback):', registration.scope);
                    }
                } catch (error) {
                    console.warn('Service Worker registration failed:', error.message || error);
                }
            }
        };
        
        // تسجيل Service Worker فوراً
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => {
                setTimeout(registerServiceWorker, 100);
            });
        } else {
            setTimeout(registerServiceWorker, 100);
        }
    </script>
</body>
</html>
